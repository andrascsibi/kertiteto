<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kerti tető kalkulátor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        height: 100dvh;
        overflow: hidden;
        background: #dce8f0;
      }

      /* ── Sidebar ─────────────────────────────────────────────────────────── */
      #controls {
        width: 260px;
        flex-shrink: 0;
        padding: 1.5rem 1.25rem;
        background: #fff;
        box-shadow: 2px 0 12px rgba(0,0,0,0.12);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
        z-index: 1;
      }

      #controls h1 {
        font-size: 1rem;
        font-weight: 700;
        color: #2e1f0f;
        line-height: 1.4;
        margin-bottom: 0.25rem;
      }

      #controls .tagline {
        font-size: 0.7rem;
        color: #8a7060;
        margin-bottom: 0.5rem;
        font-style: italic;
      }

      .section-title {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9a8070;
        margin: 1.25rem 0 0.75rem;
      }

      .param {
        margin-bottom: 1rem;
      }

      .param label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 0.82rem;
        color: #4a3828;
        margin-bottom: 0.3rem;
      }

      .param .val {
        font-weight: 600;
        color: #2e1f0f;
        font-variant-numeric: tabular-nums;
      }

      .param input[type="range"] {
        width: 100%;
        accent-color: #7a5030;
        cursor: pointer;
      }

      /* ── Clamp warning ────────────────────────────────────────────────────── */
      .clamp-warning {
        font-size: 0.7rem;
        color: #c72020;
        line-height: 1.4;
        margin: 0 0 0 0;
        min-height: 0;
        transition: opacity 0.2s;
      }
      .clamp-warning:empty {
        display: none;
      }

      /* ── Advanced section (collapsible) ──────────────────────────────────── */
      .advanced-section {
        margin: 0;
      }
      .advanced-section > summary {
        cursor: pointer;
        list-style: none;
      }
      .advanced-section > summary::-webkit-details-marker { display: none; }
      .advanced-section > summary::after {
        content: '▸';
        float: right;
        font-size: 0.7rem;
        color: #9a8070;
        transition: transform 0.15s;
      }
      .advanced-section[open] > summary::after {
        transform: rotate(90deg);
      }
      .advanced-section > .param:first-of-type {
        margin-top: 0.75rem;
      }

      /* ── Options (checkboxes) ────────────────────────────────────────────── */
      .option {
        margin-bottom: 0.6rem;
      }

      .option label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.82rem;
        color: #4a3828;
        cursor: pointer;
      }

      .option input[type="checkbox"] {
        accent-color: #7a5030;
        cursor: pointer;
      }

      .option-cost {
        display: block;
        font-size: 0.7rem;
        color: #9a8070;
        margin-left: 1.4rem;
      }

      .option-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* ── Color picker ──────────────────────────────────────────────── */
      .color-swatch {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1.5px solid rgba(0,0,0,0.12);
        cursor: pointer;
        background: #CC6E52;
        padding: 0;
        outline: none;
        transition: transform 0.1s;
        flex-shrink: 0;
      }
      .color-swatch:hover { transform: scale(1.15); }

      #color-picker, .color-picker-panel {
        display: none;
        padding: 0 0 0.6rem 0;
      }
      #color-picker.open, .color-picker-panel.open { display: block; }

      .color-picker-grid {
        display: grid;
        grid-template-columns: auto repeat(6, 24px);
        gap: 4px 6px;
        align-items: center;
      }

      .color-picker-label {
        font-size: 0.58rem;
        color: #9a8070;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .color-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        padding: 0;
        outline: none;
        transition: transform 0.1s;
      }
      .color-dot:hover { transform: scale(1.15); }
      .color-dot.selected {
        box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px #7a5030;
      }
      .color-dot.empty {
        visibility: hidden;
        pointer-events: none;
      }

      /* ── Viewport ────────────────────────────────────────────────────────── */
      #viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #viewport canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* ── Pillar count badge ──────────────────────────────────────────────── */
      #info {
        position: absolute;
        bottom: 1rem;
        right: 1rem;
        background: rgba(255,255,255,0.82);
        backdrop-filter: blur(6px);
        border-radius: 8px;
        padding: 0.6rem 0.9rem;
        font-size: 0.75rem;
        color: #4a3828;
        line-height: 1.6;
        pointer-events: none;
      }

      #info strong { color: #2e1f0f; }

      /* ── Pricing panel ────────────────────────────────────────────────── */
      #pricing {
        margin-top: auto;
        padding-top: 1.25rem;
        border-top: 1px solid #e8e0d8;
      }

      #pricing .price-total {
        font-size: 1.5rem;
        font-weight: 700;
        color: #2e1f0f;
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
      }

      #pricing .price-unit {
        font-size: 0.75rem;
        color: #8a7060;
        margin-top: 0.2rem;
      }

      #pricing .price-loading {
        font-size: 0.75rem;
        color: #9a8070;
        font-style: italic;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      #pricing .price-loading::before {
        content: '';
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #9a8070;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #pricing .price-loading.error::before {
        display: none;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ── CTA button ──────────────────────────────────────────────────── */
      #cta-button {
        display: block;
        width: 100%;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        background: #7a5030;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      #cta-button:hover { background: #5e3a20; }
      #cta-button:disabled {
        background: #b8a898;
        cursor: not-allowed;
      }

      /* ── Quote modal ───────────────────────────────────────────────────── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #fff;
        border-radius: 10px;
        padding: 1.5rem;
        width: 92%;
        max-width: 420px;
        max-height: 90dvh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      }
      .modal h2 {
        font-size: 1.1rem;
        color: #2e1f0f;
        margin-bottom: 0.25rem;
      }
      .modal .modal-reassure {
        font-size: 0.78rem;
        color: #7a5030;
        margin-bottom: 0.75rem;
      }
      .modal .modal-summary {
        background: #f5f0eb;
        border-radius: 6px;
        padding: 0.6rem 0.75rem;
        font-size: 0.78rem;
        color: #4a3828;
        line-height: 1.5;
        margin-bottom: 1rem;
      }
      .modal .modal-summary strong {
        color: #2e1f0f;
      }
      .modal .form-group {
        margin-bottom: 0.75rem;
      }
      .modal .form-group label {
        display: block;
        font-size: 0.78rem;
        color: #4a3828;
        margin-bottom: 0.2rem;
        font-weight: 500;
      }
      .modal .form-group label .required {
        color: #c0392b;
      }
      .modal .form-group input,
      .modal .form-group textarea {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border: 1px solid #d5ccc4;
        border-radius: 5px;
        font-size: 0.85rem;
        font-family: inherit;
        color: #2e1f0f;
        background: #fff;
        transition: border-color 0.15s;
      }
      .modal .form-group input:focus,
      .modal .form-group textarea:focus {
        outline: none;
        border-color: #7a5030;
      }
      .modal .form-group textarea {
        resize: vertical;
        min-height: 3rem;
      }
      .modal-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .modal-actions .btn-submit {
        flex: 1;
        padding: 0.65rem 1rem;
        background: #7a5030;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .modal-actions .btn-submit:hover { background: #5e3a20; }
      .modal-actions .btn-cancel {
        padding: 0.65rem 1rem;
        background: transparent;
        color: #8a7060;
        border: 1px solid #d5ccc4;
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .modal-actions .btn-cancel:hover { border-color: #8a7060; }
      .modal .modal-success {
        text-align: center;
        padding: 1rem 0;
      }
      .modal .modal-success .checkmark {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      .modal .modal-success h3 {
        font-size: 1rem;
        color: #2e1f0f;
        margin-bottom: 0.3rem;
      }
      .modal .modal-success p {
        font-size: 0.8rem;
        color: #8a7060;
      }

      /* ── Logo watermark ──────────────────────────────────────────────────── */
      #logo {
        position: absolute;
        bottom: 1rem;
        left: 1rem;
        height: 96px;
        opacity: 0.9;
        pointer-events: none;
      }

      /* ── Debug panel (top-right, hidden by default) ────────────────────── */
      #debug {
        display: none;
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: rgba(0,0,0,0.72);
        backdrop-filter: blur(6px);
        border-radius: 8px;
        padding: 0.6rem 0.9rem;
        font-size: 0.72rem;
        color: #e0e0e0;
        line-height: 1.6;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        font-family: ui-monospace, 'SF Mono', monospace;
      }
      #debug table {
        border-collapse: collapse;
        margin-top: 0.4rem;
        width: 100%;
      }
      #debug td { padding: 0.1rem 0.4rem 0.1rem 0; white-space: nowrap; }
      #debug td.r { text-align: right; }
      #debug tr.sep td { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 0.3rem; }
      #debug tr.total td { font-weight: 700; color: #fff; }

      /* ── Responsive: mobile (≤768px) ──────────────────────────────────── */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        #viewport {
          order: -1;
          flex: none;
          height: 55dvh;
        }

        #controls {
          width: 100%;
          height: 45dvh;
          overflow-y: auto;
          padding: 0.75rem 1rem;
          gap: 0;
        }

        #controls h1 {
          font-size: 0.9rem;
        }

        #controls .tagline {
          font-size: 0.65rem;
          margin-bottom: 0.4rem;
        }

        #controls .section-title {
          margin-top: 0.5rem;
          margin-bottom: 0.15rem;
        }

        #controls .param {
          margin-bottom: 0.3rem;
        }

        #controls input[type="range"] {
          height: 32px;
        }
        #controls input[type="range"]::-webkit-slider-thumb {
          width: 22px;
          height: 22px;
        }
        #controls input[type="range"]::-moz-range-thumb {
          width: 22px;
          height: 22px;
        }

        #controls .option {
          padding: 0.15rem 0;
        }
        #controls .option label {
          font-size: 0.82rem;
        }

        #info {
          bottom: auto;
          top: 0.5rem;
          right: 0.5rem;
          font-size: 0.65rem;
          padding: 0.4rem 0.6rem;
        }

        #logo {
          height: 36px;
          bottom: 0.5rem;
          left: 0.5rem;
        }

        #pricing .price-total {
          font-size: 1.2rem;
        }

        #cta-button {
          padding: 0.6rem 0.75rem;
          font-size: 0.82rem;
        }

        .modal {
          width: 95%;
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <aside id="controls">
      <h1>Kerti tető kalkulátor</h1>
      <p class="tagline">Kézműves minőség, sorozatgyártott áron</p>

      <p class="section-title">Méretek</p>

      <div class="param">
        <label>
          <span>Szélesség</span>
          <span class="val" id="val-width"></span>
        </label>
        <input type="range" id="inp-width" min="2.0" max="7.0" step="0.1">
        <p class="clamp-warning" id="clamp-warning-width"></p>
      </div>

      <div class="param">
        <label>
          <span>Hosszúság</span>
          <span class="val" id="val-length"></span>
        </label>
        <input type="range" id="inp-length" min="2.0" max="20.0" step="0.1">
      </div>

      <details id="advanced" class="advanced-section">
        <summary class="section-title">Haladó beállítások</summary>

        <div class="param">
          <label>
            <span>Hajlásszög</span>
            <span class="val" id="val-pitch"></span>
          </label>
          <input type="range" id="inp-pitch" min="15" max="45" step="1">
          <p class="clamp-warning" id="clamp-warning-pitch"></p>
        </div>

        <div class="param">
          <label>
            <span>Eresznyúlás</span>
            <span class="val" id="val-eaves"></span>
          </label>
          <input type="range" id="inp-eaves" min="0.25" max="1.00" step="0.05">
        </div>

        <div class="param">
          <label>
            <span>Oromzat-nyúlás</span>
            <span class="val" id="val-gable"></span>
          </label>
          <input type="range" id="inp-gable" min="0.10" max="0.60" step="0.05">
        </div>
      </details>

      <p class="section-title">Héjazat</p>

      <div class="option">
        <div class="option-header">
          <label><input type="checkbox" id="chk-lamberia" checked> Lambéria</label>
          <button type="button" class="color-swatch" id="timber-swatch" title="Lazúr szín választása" style="background:#7a5030"></button>
        </div>
        <span class="option-cost" id="cost-lamberia"></span>
      </div>
      <div id="timber-picker" class="color-picker-panel"></div>

      <div class="option">
        <label><input type="checkbox" id="chk-membrane" checked> Alátét héjazat</label>
        <span class="option-cost" id="cost-membrane"></span>
      </div>

      <div class="option">
        <div class="option-header">
          <label><input type="checkbox" id="chk-roofing" checked> Lemez fedés</label>
          <button type="button" class="color-swatch" id="color-swatch" title="Szín választása"></button>
        </div>
        <span class="option-cost" id="cost-roofing"></span>
      </div>
      <div id="color-picker"></div>

      <div id="pricing"></div>
      <button id="cta-button" disabled>Árajánlat kérése</button>
    </aside>

    <main id="viewport">
      <div id="debug"></div>
      <div id="info"></div>
      <img id="logo" src="/kertiteto.png" alt="Kertitető">
    </main>

    <div class="modal-overlay" id="quote-modal">
      <div class="modal">
        <div id="modal-form-view">
          <h2>Árajánlat kérése</h2>
          <p class="modal-reassure">Egyedi árajánlatot küldünk 24 órán belül!</p>
          <div class="modal-summary" id="modal-summary"></div>
          <form id="quote-form" action="https://formsubmit.co/hello@egyacs.com" method="POST">
            <input type="hidden" name="_subject" value="Kerti tető árajánlat">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="Konfiguráció" id="hidden-config">
            <input type="hidden" name="Becsült ár" id="hidden-price">
            <input type="hidden" name="URL" id="hidden-url">
            <div class="form-group">
              <label>Név <span class="required">*</span></label>
              <input type="text" name="Név" required autocomplete="name">
            </div>
            <div class="form-group">
              <label>E-mail cím <span class="required">*</span></label>
              <input type="email" name="E-mail" required autocomplete="email">
            </div>
            <div class="form-group">
              <label>Telefonszám</label>
              <input type="tel" name="Telefon" autocomplete="tel">
            </div>
            <div class="form-group">
              <label>Település <span class="required">*</span></label>
              <input type="text" name="Település" required>
            </div>
            <div class="form-group">
              <label>Megjegyzés</label>
              <textarea name="Megjegyzés" rows="2"></textarea>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-cancel" id="modal-cancel">Mégse</button>
              <button type="submit" class="btn-submit">Árajánlat kérése</button>
            </div>
          </form>
        </div>
        <div id="modal-success-view" class="modal-success" style="display:none">
          <div class="checkmark">✓</div>
          <h3>Köszönjük!</h3>
          <p>Árajánlatát hamarosan elküldjük a megadott e-mail címre.</p>
          <div class="modal-actions" style="justify-content:center;margin-top:1.25rem">
            <button type="button" class="btn-cancel" id="modal-close">Bezárás</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
